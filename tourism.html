<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourism - Explore Malta</title>
    <style>
        /* === ESTILOS ESTRUTURAIS BÁSICOS (Resumo) === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #fcf8f2; color: #4a3f35; font-family: 'Segoe UI', serif; line-height: 1.6; }
        .main-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        /* Card Vertical Padrão */
        .destination-card { background-color: #f4ece1; border-radius: 12px; overflow: hidden; margin-bottom: 40px; display: flex; flex-direction: column; }
        .destination-image-wrapper { width: 100%; height: 220px; overflow: hidden; }
        .large-image-wrapper { width: 100%; height: 320px; overflow: hidden; } /* Para St. Julian's */
        .destination-card img { width: 100%; height: 100%; object-fit: cover; }
        .destination-info { padding: 30px; }
        
        /* Card Horizontal (Pôr do Sol) */
        .horizontal-card { background-color: #f4ece1; border-radius: 12px; overflow: hidden; margin-bottom: 40px; display: flex; flex-direction: row; }
        .horizontal-image-wrapper { width: 45%; min-width: 250px; height: 250px; overflow: hidden; }
        .horizontal-info { width: 55%; padding: 30px; }
        
        /* Responsividade */
        @media (max-width: 650px) { .horizontal-card { flex-direction: column; } .horizontal-image-wrapper { width: 100%; } }
    </style>
</head>
<body>
    <main class="main-container">
        <!-- Valletta (Top Banner) -->
        <section class="destination-card">
            <div class="destination-image-wrapper"><img src="valeta.png" alt="Valletta"></div>
            <div class="destination-info"><h2>Valletta</h2><p>Capital.</p></div>
        </section>

        <!-- Pôr do Sol (Horizontal) -->
        <section class="horizontal-card">
            <div class="horizontal-image-wrapper"><img src="goldenbayporsol.png" alt="Sunset"></div>
            <div class="horizontal-info"><h2>Golden Bay Sunset</h2><p>Detalhes aqui.</p></div>
        </section>

        <!-- St. Julian's (Large Image) -->
        <section class="destination-card">
            <div class="large-image-wrapper"><img src="st-julians1.png" alt="St. Julian's"></div>
            <div class="destination-info"><h2>St. Julian's</h2><p>Promenade.</p></div>
        </section>
    </main>
</body>
</html>
